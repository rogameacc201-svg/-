<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>⚔️ 輕鬆玩天堂 - 討論區 ⚔️</title>
    <!-- 引入 Firebase SDK (版本 9+) -->
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --bg-color: rgba(11, 12, 16, 0.85); 
            --border-color: #bfa05d;
            --header-bg: rgba(32, 26, 22, 0.9);
            --text-main: #d1ccbc;
            --text-accent: #ffcc00;
            --input-bg: rgba(26, 26, 26, 0.9);
            --danger-red: #ff4444;
            --gold-gradient: linear-gradient(180deg, #bfa05d 0%, #7a6331 100%);
        }

        html {
            background: url('bg.png') no-repeat center center fixed;
            background-size: cover;
            background-color: #000;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: "Microsoft JhengHei", serif; 
            margin: 0; padding: 20px; min-height: 100vh;
        }

        .container { max-width: 900px; margin: 0 auto; }
        .forum-header { 
            background-color: var(--header-bg); border: 2px solid var(--border-color); padding: 20px; 
            text-align: center; margin-bottom: 20px; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .forum-header h1 { color: var(--text-accent); margin: 0; text-shadow: 2px 2px 4px #000; font-size: 2.5em; }

        .page-section { display: none; }
        .page-section.active { display: block; }

        .btn { background: var(--gold-gradient); border: 1px solid #000; color: #000; padding: 10px 20px; font-weight: bold; cursor: pointer; margin-right: 5px; font-size: 14px; }
        .btn:hover { filter: brightness(1.2); box-shadow: 0 0 10px var(--border-color); }
        .btn-back { background: #444; color: #fff; margin-bottom: 20px; }
        
        .btn-delete { background: var(--danger-red); color: white; border: none; padding: 2px 8px; font-size: 12px; cursor: pointer; margin-left: 10px; border-radius: 3px; display: none; }
        body.admin-mode .btn-delete { display: inline-block; }

        .forum-table { width: 100%; border-collapse: collapse; border: 1px solid var(--border-color); background: rgba(21, 21, 21, 0.9); }
        th { background: rgba(44, 44, 44, 0.9); color: var(--border-color); padding: 12px; border-bottom: 1px solid var(--border-color); }
        td { padding: 15px 12px; border-bottom: 1px solid #333; }
        .topic-row:hover { background-color: rgba(42, 34, 21, 0.8); cursor: pointer; }

        .topic-content { background: rgba(34, 34, 34, 0.9); border: 1px solid #444; padding: 20px; margin-bottom: 20px; }
        .reply-box { background: rgba(26, 26, 26, 0.9); border-left: 3px solid var(--border-color); padding: 10px 15px; margin-top: 10px; }
        .content-img { max-width: 100%; height: auto; margin-top: 10px; display: block; border: 1px solid #555; }

        input, textarea { width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid #555; color: #fff; box-sizing: border-box; margin-bottom: 10px; }
        .file-input-info { margin-bottom: 15px; color: #aaa; font-size: 13px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #1a1a1a; padding: 30px; border: 2px solid var(--border-color); width: 320px; box-shadow: 0 0 30px #000; }

        .admin-controls { position: absolute; right: 10px; top: 10px; display: none; gap: 5px; }
        body.admin-mode .admin-controls { display: flex; }

        .footer { text-align: center; padding: 40px; color: #888; font-size: 12px; border-top: 1px solid rgba(191, 160, 93, 0.3); background: rgba(0,0,0,0.5); margin-top: 20px; }
    </style>
</head>
<body id="body-tag">

<div class="container">
    <div class="forum-header">
        <h1>⚔️ 輕鬆玩天堂 - 討論區 ⚔️</h1>
        <div id="admin-status" style="color: #aaa; font-size: 12px; margin-top: 5px; letter-spacing: 1px;">當前身份：你是要衝+9 +10的冒險者吧</div>
        <div class="admin-controls">
            <button class="btn" style="font-size: 12px; padding: 5px 10px;" onclick="openModal('pw-modal')">🔧 更改密密</button>
            <button class="btn" style="background: #a30000; color: #fff; font-size: 12px; padding: 5px 10px;" onclick="adminLogout()">🚪 登出系統</button>
        </div>
    </div>

    <!-- 列表頁 -->
    <div id="home-page" class="page-section active">
        <button class="btn" onclick="showSection('post-page')" style="margin-bottom:15px;">⚔️ 撰寫冒險筆記</button>
        <table class="forum-table">
            <thead><tr><th align="left">📜 冒險主題</th><th width="150">👤 已成為+9 +10衝裝的冒險者</th></tr></thead>
            <tbody id="topic-list"></tbody>
        </table>
    </div>

    <!-- 管理者登入彈窗 -->
    <div id="login-modal" class="modal">
        <div class="modal-content">
            <h3 style="color: var(--text-accent); margin-top:0;">🛡️ 管理者驗證</h3>
            <input type="password" id="login-pass" placeholder="請輸入管理密令">
            <div style="display: flex; gap: 10px;">
                <button class="btn" onclick="processLogin()" style="flex:1;">登入</button>
                <button class="btn" style="background: #444; color: #fff; flex:1;" onclick="closeModal('login-modal')">取消</button>
            </div>
        </div>
    </div>

    <!-- 更改密碼彈窗 -->
    <div id="pw-modal" class="modal">
        <div class="modal-content">
            <h3 style="color: var(--text-accent); margin-top:0;">🔑 更改管理密令</h3>
            <input type="password" id="new-admin-pass" placeholder="輸入新密碼">
            <input type="password" id="confirm-admin-pass" placeholder="再次輸入新密碼">
            <div style="display: flex; gap: 10px;">
                <button class="btn" onclick="processChangePw()" style="flex:1;">確認修改</button>
                <button class="btn" style="background: #444; color: #fff; flex:1;" onclick="closeModal('pw-modal')">取消</button>
            </div>
        </div>
    </div>

    <!-- 主題內容頁、發佈頁面 (略，保持不變) -->
    <div id="view-page" class="page-section">
        <button class="btn btn-back" onclick="showSection('home-page')">⬅️ 返回村莊</button>
        <div class="topic-content">
            <h2 id="display-title" style="color: var(--text-accent); margin:0;"></h2>
            <button class="btn-delete" id="delete-topic-btn">🗑️ 焚毀此紀錄</button>
            <p>紀錄者：<span style="color:#88bcff; font-weight:bold;" id="display-author"></span></p>
            <div id="display-content" style="white-space: pre-wrap; margin-top:15px; border-top:1px solid #444; padding-top:15px;"></div>
        </div>
        <div id="reply-list"></div>
        <div style="background:rgba(28, 28, 28, 0.9); padding:25px; border:1px dashed #555; margin-top:20px;">
            <h3>💬 留言回覆</h3>
            <input type="text" id="reply-name" placeholder="留遊戲ID才可以衝上武器+9 +10">
            <textarea id="reply-content" placeholder="內容..."></textarea>
            <div class="file-input-info">📎 附帶圖像 (限制 500KB)：<input type="file" id="reply-file" accept="image/*"></div>
            <button class="btn" onclick="submitReply()">🏹 傳送訊息</button>
        </div>
    </div>

    <div id="post-page" class="page-section">
        <button class="btn btn-back" onclick="showSection('home-page')">⬅️ 取消撰寫</button>
        <div style="background:rgba(28, 28, 28, 0.9); padding:25px; border:2px solid var(--border-color);">
            <h2>📜 要討論什麼好呢？</h2>
            <input type="text" id="post-name" placeholder="留遊戲ID才可以衝上武器+9 +10">
            <input type="text" id="post-title" placeholder="主題標題">
            <textarea id="post-content" placeholder="內容 (文字或圖片網址)..." style="height:150px;"></textarea>
            <div class="file-input-info">📎 附帶圖像 (限制 500KB)：<input type="file" id="post-file" accept="image/*"></div>
            <button class="btn" onclick="submitPost()">✅ 確認發佈</button>
        </div>
    </div>

    <div class="footer">
        願殷海薩的祝福與你同在。 | <span style="cursor:pointer; color:#555;" onclick="openModal('login-modal')">管理員登入</span>
    </div>
</div>

<script>
    // --- 1. Firebase 配置 (請自行填入) ---
    const firebaseConfig = {
  apiKey: "AIzaSyDfV9VWyrgcomvU6M5kP2Sugr29zoqrlo8",
  authDomain: "game1-7c85c.firebaseapp.com",
  databaseURL: "https://game1-7c85c-default-rtdb.firebaseio.com",
  projectId: "game1-7c85c",
  storageBucket: "game1-7c85c.firebasestorage.app",
  messagingSenderId: "1082794968010",
  appId: "1:1082794968010:web:8276a41c630442b3a88533",
  measurementId: "G-4P46QECVZX"
};

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const topicsRef = db.ref('topics');
    const adminRef = db.ref('admin_config');

    let topicsData = {};
    let currentTopicId = null;
    let currentAdminPass = "1qaz@WSX"; // 預設值，之後會從雲端同步
    const MAX_FILE_SIZE = 500 * 1024;

    // --- 2. 監聽雲端資料 ---
    topicsRef.on('value', (snapshot) => {
        topicsData = snapshot.val() || {};
        renderTopics();
        if (currentTopicId) viewTopic(currentTopicId);
    });

    // 監聽管理員密碼變化
    adminRef.child('password').on('value', (snapshot) => {
        if (snapshot.val()) {
            currentAdminPass = snapshot.val();
        }
    });

    // --- 3. 核心邏輯 ---
    function formatContent(text, attachedImg) {
        const urlRegex = /(https?:\/\/[^\s]+(\.jpg|\.png|\.gif|\.jpeg|\.webp))/gi;
        let html = (text || "").replace(urlRegex, (url) => `<img src="${url}" class="content-img" />`);
        if (attachedImg) html += `<img src="${attachedImg}" class="content-img" />`;
        return html;
    }

    async function fileToBase64(file) {
        if (!file) return null;
        if (file.size > MAX_FILE_SIZE) {
            alert(`⛔ 檔案太大了！目前大小：${Math.round(file.size/1024)}KB，最高限制：500KB`);
            return "ERROR_SIZE";
        }
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
        });
    }

    function renderTopics() {
        const list = document.getElementById('topic-list');
        list.innerHTML = '';
        const keys = Object.keys(topicsData).reverse();
        keys.forEach(id => {
            const topic = topicsData[id];
            const row = document.createElement('tr');
            row.className = "topic-row";
            row.onclick = () => viewTopic(id);
            row.innerHTML = `<td>${topic.title} <button class="btn-delete" onclick="deleteTopic('${id}', event)">[🗑️ 刪除]</button></td><td style="color:#88bcff; font-weight:bold;">${topic.name}</td>`;
            list.appendChild(row);
        });
    }

    function viewTopic(id) {
        currentTopicId = id;
        const t = topicsData[id];
        if (!t) { showSection('home-page'); return; }
        document.getElementById('display-title').innerText = t.title;
        document.getElementById('display-author').innerText = t.name;
        document.getElementById('display-content').innerHTML = formatContent(t.content, t.image);
        document.getElementById('delete-topic-btn').onclick = () => deleteTopic(id);
        const replyList = document.getElementById('reply-list');
        replyList.innerHTML = '';
        if (t.replies) {
            Object.keys(t.replies).forEach(rId => {
                const r = t.replies[rId];
                const div = document.createElement('div');
                div.className = 'reply-box';
                div.innerHTML = `<div style="font-size:12px; color:#bfa05d; margin-bottom:5px;">${r.name} 說：<button class="btn-delete" onclick="deleteReply('${id}', '${rId}')">[🗑️ 刪除]</button></div><div>${formatContent(r.content, r.image)}</div>`;
                replyList.appendChild(div);
            });
        }
        showSection('view-page');
    }

    async function submitPost() {
        const n = document.getElementById('post-name').value;
        const t = document.getElementById('post-title').value;
        const c = document.getElementById('post-content').value;
        const fileInput = document.getElementById('post-file');
        if(!n || !t || !c) return alert("請填寫完整");
        const base64Img = await fileToBase64(fileInput.files[0]);
        if (base64Img === "ERROR_SIZE") return;
        topicsRef.push({ name: n, title: t, content: c, image: base64Img, timestamp: Date.now() });
        showSection('home-page');
        document.getElementById('post-name').value = ''; document.getElementById('post-title').value = ''; 
        document.getElementById('post-content').value = ''; fileInput.value = '';
    }

    async function submitReply() {
        const n = document.getElementById('reply-name').value;
        const c = document.getElementById('reply-content').value;
        const fileInput = document.getElementById('reply-file');
        if(!n || !c) return alert("不可為空");
        const base64Img = await fileToBase64(fileInput.files[0]);
        if (base64Img === "ERROR_SIZE") return;
        db.ref(`topics/${currentTopicId}/replies`).push({ name: n, content: c, image: base64Img, timestamp: Date.now() });
        document.getElementById('reply-name').value = ''; document.getElementById('reply-content').value = ''; 
        fileInput.value = '';
    }

    function deleteTopic(id, event) {
        if(event) event.stopPropagation();
        if(!confirm("確定要焚毀此紀錄嗎？")) return;
        db.ref(`topics/${id}`).remove();
        showSection('home-page');
    }

    function deleteReply(tId, rId) {
        if(!confirm("刪除回覆？")) return;
        db.ref(`topics/${tId}/replies/${rId}`).remove();
    }

    // --- 管理功能 ---
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    
    function processLogin() {
        if (document.getElementById('login-pass').value === currentAdminPass) {
            document.getElementById('body-tag').classList.add('admin-mode');
            document.getElementById('admin-status').innerText = `🔱 管理模式啟動`;
            closeModal('login-modal');
        } else { alert("密令錯誤！"); }
    }

    function processChangePw() {
        const newP = document.getElementById('new-admin-pass').value;
        const confP = document.getElementById('confirm-admin-pass').value;
        if (!newP) return alert("不可為空");
        if (newP !== confP) return alert("確認密碼不符");
        
        // 更新到 Firebase
        adminRef.update({ password: newP }).then(() => {
            alert("🔑 密令已成功更新至雲端！");
            closeModal('pw-modal');
        });
    }

    function adminLogout() {
        document.getElementById('body-tag').classList.remove('admin-mode');
        document.getElementById('admin-status').innerText = "當前身份：你是要衝+9 +10的冒險者吧";
    }

    function showSection(id) {
        if (id === 'home-page') currentTopicId = null;
        document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }
</script>

</body>
</html>
