<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚔️ 輕鬆玩天堂 - 討論區 ⚔️</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --bg-color: rgba(11, 12, 16, 0.95); 
            --border-color: #bfa05d;
            --header-bg: rgba(32, 26, 22, 0.95);
            --text-main: #d1ccbc;
            --text-accent: #ffcc00;
            --input-bg: rgba(26, 26, 26, 0.9);
            --danger-red: #ff4444;
            --gold-gradient: linear-gradient(180deg, #bfa05d 0%, #7a6331 100%);
        }

        html {
            background: url('bg.png') no-repeat center center fixed;
            background-size: cover;
            background-color: #000;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif; 
            margin: 0; padding: 10px; min-height: 100vh;
        }

        .container { max-width: 900px; margin: 0 auto; }

        #browser-notice {
            display: none; background: #a30000; color: white; text-align: center;
            padding: 10px; font-size: 14px; border: 2px solid var(--text-accent);
            margin-bottom: 15px; border-radius: 5px;
        }

        .side-menu-container {
            position: fixed; right: 0; top: 50%; transform: translateY(-50%); z-index: 9999;
            display: flex; align-items: center; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .side-menu-container.hidden { transform: translateY(-50%) translateX(102px); }
        .side-toggle-btn {
            background: var(--header-bg); border: 2px solid var(--border-color); border-right: none;
            color: var(--text-accent); padding: 15px 6px; cursor: pointer; border-radius: 8px 0 0 8px;
            font-size: 12px; writing-mode: vertical-rl; letter-spacing: 2px;
        }
        .side-menu { background: rgba(20, 20, 20, 0.95); border: 2px solid var(--border-color); border-right: none; width: 100px; }
        .side-menu a { display: block; padding: 15px 10px; color: var(--text-accent); text-decoration: none; text-align: center; font-weight: bold; border-bottom: 1px solid rgba(191, 160, 93, 0.2); }

        .new-tag {
            display: inline-block; background: #ff0000; color: white; font-size: 10px;
            padding: 2px 5px; border-radius: 3px; margin-right: 8px; font-weight: bold;
            animation: blink 1s infinite alternate;
        }
        @keyframes blink { from { opacity: 1; } to { opacity: 0.5; } }

        .post-img { max-width: 100%; height: auto; margin-top: 10px; border: 1px solid var(--border-color); display: block; }

        .forum-header { background-color: var(--header-bg); border: 2px solid var(--border-color); padding: 20px; text-align: center; margin-bottom: 20px; }
        .forum-header h1 { color: var(--text-accent); margin: 0; font-size: 1.8em; }

        .action-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        .search-wrapper { display: flex; align-items: center; background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 4px; padding: 0 10px; flex-grow: 1; max-width: 300px; }
        .search-input { border: none !important; padding: 8px !important; background: transparent !important; color: white !important; }

        .btn { background: var(--gold-gradient); border: 1px solid #000; color: #000; padding: 10px 18px; font-weight: bold; cursor: pointer; }
        .btn:disabled { background: #555; color: #aaa; filter: grayscale(1); }
        
        .forum-table { width: 100%; border-collapse: collapse; background: rgba(21, 21, 21, 0.9); }
        th { background: rgba(44, 44, 44, 0.9); color: var(--border-color); padding: 12px; text-align: left; border-bottom: 2px solid var(--border-color); }
        td { padding: 15px 12px; border-bottom: 1px solid #333; }
        .topic-row:hover { background-color: rgba(42, 34, 21, 0.8); cursor: pointer; }

        .admin-checkbox { display: none; }
        body.admin-mode .admin-checkbox { display: inline-block; }

        input, textarea { width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid #555; color: #fff; margin-bottom: 10px; box-sizing: border-box; }
        
        .page-section { display: none; }
        .page-section.active { display: block; }
        .reply-box { background: rgba(26, 26, 26, 0.9); border-left: 3px solid var(--border-color); padding: 15px; margin-top: 10px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #1a1a1a; padding: 25px; border: 2px solid var(--border-color); width: 320px; }
    </style>
</head>
<body id="body-tag">

<div id="browser-notice">⚠️ 偵測到內建瀏覽器，請點擊右上角「...」並選擇「使用預設瀏覽器開啟」。</div>

<div class="side-menu-container" id="sideMenuContainer">
    <div class="side-toggle-btn" onclick="toggleSideMenu()" id="sideToggleBtn">◀ 快速傳送</div>
    <nav class="side-menu">
        <a href="https://rogameacc201-svg.github.io/my-auction/" target="_blank">💰 拍賣場</a>
        <a href="https://rogameacc201-svg.github.io/-/" target="_blank">💬 討論區</a>
    </nav>
</div>

<div class="container">
    <div class="forum-header">
        <h1>⚔️ 輕鬆玩天堂 - 討論區 ⚔️</h1>
        <div id="admin-status" style="color: #888; font-size: 12px;">冒險者模式</div>
        <button id="change-pass-btn" class="btn" style="display:none; font-size:11px;" onclick="openModal('pass-modal')">🔑 修改管理密令</button>
    </div>

    <div id="home-page" class="page-section active">
        <div class="action-bar">
            <button class="btn" onclick="showSection('post-page')">📝 撰寫冒險筆記</button>
            <div class="search-wrapper">
                <input type="text" id="search-input" class="search-input" placeholder="搜索..." onkeyup="filterTopics()">
            </div>
            <button class="btn" onclick="batchDelete()" style="background:#a30000; color:#fff; display:none;">🗑️ 批次刪除</button>
        </div>
        <table class="forum-table">
            <thead>
                <tr>
                    <th width="40"><input type="checkbox" id="check-all" class="admin-checkbox" onclick="toggleAll(this)"></th>
                    <th>📜 主題列表</th>
                    <th width="150">👤 作者</th>
                </tr>
            </thead>
            <tbody id="topic-list"></tbody>
        </table>
    </div>

    <div id="view-page" class="page-section">
        <button class="btn" style="width:100%; margin-bottom:15px; background:#444; color:#fff;" onclick="showSection('home-page')">⬅️ 返回村莊</button>
        <div style="background:rgba(34,34,34,0.9); padding:20px; border:1px solid #444;">
            <h2 id="display-title" style="color:var(--text-accent); margin:0;"></h2>
            <div id="display-author" style="color:#88bcff; font-size:13px;"></div>
            <hr style="border:0; border-top:1px solid #444; margin:15px 0;">
            <div id="display-content" style="white-space: pre-wrap;"></div>
        </div>
        <div id="reply-list"></div>
        <div style="background:rgba(40,40,40,0.8); padding:20px; border:1px dashed var(--border-color); margin-top:20px;">
            <input type="text" id="reply-name" placeholder="稱呼">
            <textarea id="reply-content" placeholder="內容... (可貼連結或直接 Ctrl+V 貼上圖片)"></textarea>
            <button class="btn" id="reply-submit-btn" onclick="submitReply()" style="width:100%;">🏹 送出回覆</button>
        </div>
    </div>

    <div id="post-page" class="page-section">
        <button class="btn" style="width:100%; margin-bottom:15px; background:#444; color:#fff;" onclick="showSection('home-page')">⬅️ 取消</button>
        <input type="text" id="post-name" placeholder="冒險者名稱">
        <input type="text" id="post-title" placeholder="主題">
        <textarea id="post-content" placeholder="內容... (可貼連結或直接 Ctrl+V 貼上圖片)" style="height:200px;"></textarea>
        <button class="btn" id="post-submit-btn" onclick="submitPost()" style="width:100%;">✅ 確認發佈</button>
    </div>

    <div id="login-modal" class="modal"><div class="modal-content">
        <h3>🛡️ 管理員驗證</h3>
        <input type="password" id="login-pass" placeholder="密令">
        <button class="btn" onclick="processLogin()" style="width:100%;">登入</button>
    </div></div>

    <div id="pass-modal" class="modal"><div class="modal-content">
        <h3>🔑 修改管理密令</h3>
        <input type="password" id="new-pass" placeholder="新密令">
        <button class="btn" onclick="updatePassword()" style="width:100%;">確認變更</button>
    </div></div>
</div>

<script>
    // --- 初始設定 ---
    const firebaseConfig = {
        apiKey: "AIzaSyDfV9VWyrgcomvU6M5kP2Sugr29zoqrlo8",
        authDomain: "game1-7c85c.firebaseapp.com",
        databaseURL: "https://game1-7c85c-default-rtdb.firebaseio.com",
        projectId: "game1-7c85c",
        storageBucket: "game1-7c85c.firebasestorage.app",
        messagingSenderId: "1082794968010",
        appId: "1:1082794968010:web:8276a41c630442b3a88533",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const topicsRef = db.ref('topics');
    const configRef = db.ref('config');

    let topicsData = {};
    let currentTopicId = null;
    let adminPass = "1qaz@WSX";

    configRef.child('adminPass').on('value', (snap) => { if(snap.val()) adminPass = snap.val(); });

    // --- 圖片貼上監聽器 (核心功能) ---
    function setupPasteImage(elementId) {
        document.getElementById(elementId).addEventListener('paste', function(e) {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let index in items) {
                const item = items[index];
                if (item.kind === 'file') {
                    const blob = item.getAsFile();
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        const base64Img = event.target.result;
                        const textarea = document.getElementById(elementId);
                        const start = textarea.selectionStart;
                        const end = textarea.selectionEnd;
                        const text = textarea.value;
                        // 將 Base64 插入到光標位置
                        textarea.value = text.slice(0, start) + "\n" + base64Img + "\n" + text.slice(end);
                    };
                    reader.readAsDataURL(blob);
                }
            }
        });
    }
    setupPasteImage('post-content');
    setupPasteImage('reply-content');

    // --- 內容渲染邏輯 ---
    function formatContent(text) {
        if (!text) return "";
        // 1. 處理直接貼上的 Base64 圖片
        const base64Regex = /data:image\/[a-zA-Z]*;base64,[^\s]+/g;
        text = text.replace(base64Regex, (img) => `<br><img src="${img}" class="post-img"><br>`);

        // 2. 處理圖片網址連結
        const urlRegex = /(https?:\/\/[^\s]+\.(?:jpeg|jpg|gif|png|webp|bmp))/gi;
        text = text.replace(urlRegex, (url) => `<br><img src="${url}" class="post-img"><br>`);

        // 3. 處理一般網址
        const linkRegex = /(?<!src=")(https?:\/\/[^\s]+)/g;
        return text.replace(linkRegex, (url) => `<a href="${url}" target="_blank" style="color:var(--text-accent)">${url}</a>`);
    }

    // --- 原有邏輯保留 ---
    topicsRef.on('value', (snap) => { topicsData = snap.val() || {}; renderTopics(); if (currentTopicId) viewTopic(currentTopicId); });

    function renderTopics() {
        const list = document.getElementById('topic-list');
        list.innerHTML = '';
        const readList = JSON.parse(localStorage.getItem('readTopics') || '[]');

        Object.keys(topicsData).reverse().forEach(id => {
            const t = topicsData[id];
            const isRecent = (Date.now() - t.time) < 86400000;
            const isUnread = !readList.includes(id);
            const newTag = (isRecent && isUnread) ? `<span class="new-tag">NEW</span>` : '';
            const rCount = t.replies ? Object.keys(t.replies).length : 0;

            const row = document.createElement('tr');
            row.className = 'topic-row';
            row.innerHTML = `
                <td><input type="checkbox" class="admin-checkbox item-check" value="${id}"></td>
                <td onclick="viewTopic('${id}')">${newTag}${t.title}</td>
                <td onclick="viewTopic('${id}')">${t.name} <span style="font-size:11px; color:#888;">(💬 ${rCount})</span></td>
            `;
            list.appendChild(row);
        });
    }

    function viewTopic(id) {
        currentTopicId = id;
        const t = topicsData[id];
        if(!t) return;

        let readList = JSON.parse(localStorage.getItem('readTopics') || '[]');
        if(!readList.includes(id)) { readList.push(id); localStorage.setItem('readTopics', JSON.stringify(readList)); renderTopics(); }

        document.getElementById('display-title').innerText = t.title;
        document.getElementById('display-author').innerText = "筆記者：" + t.name;
        document.getElementById('display-content').innerHTML = formatContent(t.content);
        
        const rList = document.getElementById('reply-list');
        rList.innerHTML = '';
        if(t.replies) Object.values(t.replies).forEach(r => {
            const d = document.createElement('div');
            d.className = 'reply-box';
            d.innerHTML = `<small style="color:var(--border-color)">${r.name}：</small><br>${formatContent(r.content)}`;
            rList.appendChild(d);
        });
        showSection('view-page');
    }

    function startCooldown(id, text) {
        const btn = document.getElementById(id);
        btn.disabled = true;
        let time = 20;
        const timer = setInterval(() => {
            btn.innerText = `⏳ ${time}s`;
            if (time-- <= 0) { clearInterval(timer); btn.disabled = false; btn.innerText = text; }
        }, 1000);
    }

    async function submitPost() {
        const n = document.getElementById('post-name').value;
        const t = document.getElementById('post-title').value;
        const c = document.getElementById('post-content').value;
        if(!n || !t || !c) return alert("請填寫完整");
        topicsRef.push({ name: n, title: t, content: c, time: Date.now() }).then(() => {
            showSection('home-page');
            document.getElementById('post-title').value = '';
            document.getElementById('post-content').value = '';
            startCooldown('post-submit-btn', '✅ 確認發佈');
        });
    }

    async function submitReply() {
        const n = document.getElementById('reply-name').value;
        const c = document.getElementById('reply-content').value;
        if(!n || !c) return alert("請填寫完整");
        db.ref(`topics/${currentTopicId}/replies`).push({ name: n, content: c, time: Date.now() }).then(() => {
            document.getElementById('reply-content').value = '';
            startCooldown('reply-submit-btn', '🏹 送出回覆');
        });
    }

    function toggleSideMenu() {
        const container = document.getElementById('sideMenuContainer');
        container.classList.toggle('hidden');
        document.getElementById('sideToggleBtn').innerText = container.classList.contains('hidden') ? "▶ 展開" : "◀ 隱藏";
    }

    function showSection(id) {
        document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'home-page') currentTopicId = null;
    }

    function processLogin() {
        if(document.getElementById('login-pass').value === adminPass) {
            document.getElementById('body-tag').classList.add('admin-mode');
            document.querySelector('[onclick="batchDelete()"]').style.display = 'block';
            document.getElementById('change-pass-btn').style.display = 'inline-block';
            document.getElementById('admin-status').innerText = "🔱 管理模式";
            closeModal('login-modal');
        } else alert("密令錯誤");
    }

    function updatePassword() {
        const newP = document.getElementById('new-pass').value;
        configRef.update({ adminPass: newP }).then(() => { alert("已更新"); closeModal('pass-modal'); });
    }

    function filterTopics() {
        const q = document.getElementById('search-input').value.toLowerCase();
        document.querySelectorAll('.topic-row').forEach(row => {
            row.style.display = row.innerText.toLowerCase().includes(q) ? "" : "none";
        });
    }

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function toggleAll(src) { document.querySelectorAll('.item-check').forEach(cb => cb.checked = src.checked); }
    function batchDelete() {
        const sel = document.querySelectorAll('.item-check:checked');
        if(sel.length && confirm(`刪除 ${sel.length} 項？`)) sel.forEach(cb => db.ref(`topics/${cb.value}`).remove());
    }
</script>
</body>
</html>
