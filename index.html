<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚔️ 輕鬆玩天堂 - 討論區 ⚔️</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --bg-color: rgba(11, 12, 16, 0.9); 
            --border-color: #bfa05d;
            --header-bg: rgba(32, 26, 22, 0.95);
            --text-main: #d1ccbc;
            --text-accent: #ffcc00;
            --input-bg: rgba(26, 26, 26, 0.9);
            --danger-red: #ff4444;
            --gold-gradient: linear-gradient(180deg, #bfa05d 0%, #7a6331 100%);
        }

        html {
            background: url('bg.png') no-repeat center center fixed;
            background-size: cover;
            background-color: #000;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif; 
            margin: 0; padding: 10px; min-height: 100vh;
        }

        .container { max-width: 900px; margin: 0 auto; }

        /* --- 新增：浮動跟蹤選單 --- */
        .side-menu {
            position: fixed;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            z-index: 9999;
            background: rgba(20, 20, 20, 0.95);
            border: 2px solid var(--border-color);
            border-right: none;
            border-radius: 8px 0 0 8px;
            box-shadow: -5px 0 15px rgba(0,0,0,0.8);
            overflow: hidden;
            width: 100px;
        }

        .side-menu a {
            display: block;
            padding: 15px 10px;
            color: var(--text-accent);
            text-decoration: none;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
            border-bottom: 1px solid rgba(191, 160, 93, 0.3);
            transition: 0.3s;
        }

        .side-menu a:last-child { border-bottom: none; }
        .side-menu a:hover {
            background: var(--gold-gradient);
            color: #000;
        }

        .side-menu-title {
            background: #333;
            color: #fff;
            font-size: 11px;
            padding: 5px 0;
            text-align: center;
            letter-spacing: 1px;
        }

        /* --- 舊有樣式優化 --- */
        .forum-header { 
            background-color: var(--header-bg); border: 2px solid var(--border-color); 
            padding: 20px 10px; text-align: center; margin-bottom: 20px; 
            position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .forum-header h1 { color: var(--text-accent); margin: 0; text-shadow: 2px 2px 4px #000; font-size: 1.8em; }

        .btn { background: var(--gold-gradient); border: 1px solid #000; color: #000; padding: 10px 18px; font-weight: bold; cursor: pointer; font-size: 14px; transition: 0.3s; border-radius: 2px; }
        .btn:hover { filter: brightness(1.2); box-shadow: 0 0 10px var(--border-color); }
        .btn:disabled { background: #555; color: #aaa; cursor: not-allowed; filter: grayscale(1); }
        
        .btn-post-main { display: inline-block; width: auto; padding: 8px 16px; font-size: 13px; margin-bottom: 15px; }
        .btn-batch-delete { display: none; background: #a30000; color: #fff; padding: 8px 16px; font-size: 13px; margin-left: 10px; }
        body.admin-mode .btn-batch-delete { display: inline-block; }

        .btn-back { background: #444; color: #fff; margin-bottom: 20px; width: 100%; border-radius: 4px; }
        .btn-delete { background: var(--danger-red); color: white; border: none; padding: 3px 8px; font-size: 11px; cursor: pointer; border-radius: 3px; display: none; }
        body.admin-mode .btn-delete { display: inline-block; }

        .forum-table { width: 100%; border-collapse: collapse; background: rgba(21, 21, 21, 0.9); border: 1px solid #333; }
        th { background: rgba(44, 44, 44, 0.9); color: var(--border-color); padding: 12px; border-bottom: 2px solid var(--border-color); text-align: left; }
        td { padding: 15px 12px; border-bottom: 1px solid #333; }
        .topic-row:hover { background-color: rgba(42, 34, 21, 0.8); cursor: pointer; }

        .admin-checkbox { display: none; transform: scale(1.2); margin-right: 10px; cursor: pointer; }
        body.admin-mode .admin-checkbox { display: inline-block; }

        input, textarea { width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid #555; color: #fff; margin-bottom: 10px; border-radius: 4px; font-size: 16px; box-sizing: border-box; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: #1a1a1a; padding: 25px; border: 2px solid var(--border-color); width: 100%; max-width: 320px; box-shadow: 0 0 30px #000; border-radius: 5px; }

        .footer { text-align: center; padding: 30px; color: #666; font-size: 12px; border-top: 1px solid rgba(191, 160, 93, 0.2); margin-top: 20px; }
        .page-section { display: none; }
        .page-section.active { display: block; }
        .content-img { max-width: 100%; height: auto; margin-top: 10px; display: block; border: 1px solid #555; border-radius: 4px; }
        .topic-content { background: rgba(34, 34, 34, 0.9); border: 1px solid #444; padding: 15px; margin-bottom: 20px; border-radius: 4px; }
        .reply-box { background: rgba(26, 26, 26, 0.9); border-left: 3px solid var(--border-color); padding: 15px; margin-top: 10px; }

        @media (max-width: 600px) {
            .side-menu { width: 80px; }
            .side-menu a { font-size: 12px; padding: 10px 5px; }
        }
    </style>
</head>
<body id="body-tag">

<!-- 浮動跟蹤選單 -->
<nav class="side-menu">
    <div class="side-menu-title">傳送門</div>
    <a href="https://rogameacc201-svg.github.io/my-auction/" target="_blank">💰 拍賣場</a>
    <a href="https://rogameacc201-svg.github.io/-/" target="_blank">💬 討論區</a>
</nav>

<div class="container">
    <div class="forum-header">
        <h1>⚔️ 輕鬆玩天堂 - 討論區 ⚔️</h1>
        <div id="admin-status" style="color: #888; font-size: 12px; margin-top: 5px;">冒險者模式</div>
        <div class="admin-controls" id="admin-ctrls" style="display:none; gap:10px; justify-content:center; margin-top:10px;">
            <button class="btn" style="padding: 5px 15px;" onclick="openModal('pw-modal')">🔧 修改密令</button>
            <button class="btn" style="background: #a30000; color: #fff; padding: 5px 15px;" onclick="adminLogout()">🚪 登出</button>
        </div>
    </div>

    <!-- 1. 列表頁 -->
    <div id="home-page" class="page-section active">
        <button class="btn btn-post-main" onclick="showSection('post-page')">📝 撰寫冒險筆記</button>
        <button class="btn btn-batch-delete" onclick="batchDelete()">🗑️ 批次刪除選中項</button>
        <table class="forum-table">
            <thead>
                <tr>
                    <th width="40"><input type="checkbox" id="check-all" class="admin-checkbox" onclick="toggleAll(this)"></th>
                    <th>📜 主題列表</th>
                    <th width="100">👤 作者</th>
                </tr>
            </thead>
            <tbody id="topic-list"></tbody>
        </table>
    </div>

    <!-- 2. 主題內容頁 -->
    <div id="view-page" class="page-section">
        <button class="btn btn-back" onclick="showSection('home-page')">⬅️ 回到村莊列表</button>
        <div class="topic-content">
            <h2 id="display-title" style="color: var(--text-accent); margin-bottom:5px;"></h2>
            <div style="font-size:13px; color:#88bcff;">筆記者：<span id="display-author"></span></div>
            <button class="btn-delete" id="delete-topic-btn">🗑️ 焚毀紀錄</button>
            <div id="display-content" style="white-space: pre-wrap; margin-top:20px; line-height:1.6; border-top:1px solid #444; padding-top:15px;"></div>
        </div>
        <div id="reply-list"></div>
        <div style="background:rgba(40, 40, 40, 0.8); padding:20px; border:1px dashed var(--border-color); margin-top:20px; border-radius:8px;">
            <h3 style="margin-top:0;">💬 發表回覆</h3>
            <input type="text" id="reply-name" placeholder="你的稱呼">
            <textarea id="reply-content" placeholder="輸入留言內容..." style="height:100px;"></textarea>
            <div style="font-size:12px; color:#aaa; margin-bottom:10px;">📎 圖片上傳 (限 500KB)：<input type="file" id="reply-file" accept="image/*"></div>
            <button class="btn" id="reply-submit-btn" onclick="submitReply()" style="width:100%;">🏹 送出回覆</button>
        </div>
    </div>

    <!-- 3. 發佈頁面 -->
    <div id="post-page" class="page-section">
        <button class="btn btn-back" onclick="showSection('home-page')">⬅️ 取消撰寫</button>
        <div style="background:rgba(30, 30, 30, 0.9); padding:20px; border:1px solid var(--border-color); border-radius:8px;">
            <h2 style="color:var(--text-accent); margin-top:0;">✍️ 新的冒險紀錄</h2>
            <input type="text" id="post-name" placeholder="冒險者名稱">
            <input type="text" id="post-title" placeholder="紀錄主題">
            <textarea id="post-content" placeholder="內容描述..." style="height:180px;"></textarea>
            <div style="font-size:12px; color:#aaa; margin-bottom:10px;">📎 圖片上傳 (限 500KB)：<input type="file" id="post-file" accept="image/*"></div>
            <button class="btn" id="post-submit-btn" onclick="submitPost()" style="width:100%;">✅ 確認發佈</button>
        </div>
    </div>

    <!-- 彈窗 -->
    <div id="login-modal" class="modal"><div class="modal-content">
        <h3 style="color:var(--text-accent);">🛡️ 管理員驗證</h3>
        <input type="password" id="login-pass" placeholder="請輸入密令">
        <button class="btn" onclick="processLogin()" style="width:100%; margin-top:10px;">登入</button>
        <button class="btn" style="width:100%; margin-top:5px; background:#444; color:#fff;" onclick="closeModal('login-modal')">取消</button>
    </div></div>

    <div id="pw-modal" class="modal"><div class="modal-content">
        <h3 style="color:var(--text-accent);">🔑 修改雲端密令</h3>
        <input type="password" id="new-pw" placeholder="新密碼">
        <input type="password" id="conf-pw" placeholder="確認新密碼">
        <button class="btn" onclick="processChangePw()" style="width:100%; margin-top:10px;">確認修改</button>
        <button class="btn" style="width:100%; margin-top:5px; background:#444; color:#fff;" onclick="closeModal('pw-modal')">取消</button>
    </div></div>

    <div class="footer">
        系統版本：3.8 亞丁雲端版 | <span onclick="openModal('login-modal')" style="cursor:pointer;">管理登入</span>
    </div>
</div>

<script>
    // --- 1. Firebase 配置 (請更換為你的配置) ---
    const firebaseConfig = {
  apiKey: "AIzaSyDfV9VWyrgcomvU6M5kP2Sugr29zoqrlo8",
  authDomain: "game1-7c85c.firebaseapp.com",
  databaseURL: "https://game1-7c85c-default-rtdb.firebaseio.com",
  projectId: "game1-7c85c",
  storageBucket: "game1-7c85c.firebasestorage.app",
  messagingSenderId: "1082794968010",
  appId: "1:1082794968010:web:8276a41c630442b3a88533",
  measurementId: "G-4P46QECVZX"
};

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const topicsRef = db.ref('topics');
    const adminRef = db.ref('admin_config');

    let topicsData = {};
    let currentTopicId = null;
    let currentAdminPass = "1qaz@WSX"; 
    const MAX_SIZE = 500 * 1024;
    const COOLDOWN_TIME = 20; // 20秒冷卻

    topicsRef.on('value', (snap) => {
        topicsData = snap.val() || {};
        renderTopics();
        if (currentTopicId) viewTopic(currentTopicId);
    });

    adminRef.child('password').on('value', (snap) => {
        if (snap.val()) currentAdminPass = snap.val();
    });

    // --- 2. 核心功能 ---
    function renderTopics() {
        const list = document.getElementById('topic-list');
        list.innerHTML = '';
        Object.keys(topicsData).reverse().forEach(id => {
            const t = topicsData[id];
            const row = document.createElement('tr');
            row.className = 'topic-row';
            row.onclick = (e) => {
                if (e.target.type !== 'checkbox' && !e.target.classList.contains('btn-delete')) {
                    viewTopic(id);
                }
            };
            row.innerHTML = `
                <td><input type="checkbox" class="admin-checkbox item-check" value="${id}"></td>
                <td>${t.title} <button class="btn-delete" onclick="deleteTopic('${id}', event)">[🗑️]</button></td>
                <td>${t.name}</td>
            `;
            list.appendChild(row);
        });
        document.getElementById('check-all').checked = false;
    }

    function startCooldown(btnId, originalText) {
        const btn = document.getElementById(btnId);
        btn.disabled = true;
        let timeLeft = COOLDOWN_TIME;
        const timer = setInterval(() => {
            btn.innerText = `⏳ 等待 ${timeLeft}s...`;
            timeLeft--;
            if (timeLeft < 0) {
                clearInterval(timer);
                btn.disabled = false;
                btn.innerText = originalText;
            }
        }, 1000);
    }

    async function submitPost() {
        const n = document.getElementById('post-name').value;
        const t = document.getElementById('post-title').value;
        const c = document.getElementById('post-content').value;
        const f = document.getElementById('post-file').files[0];
        if(!n || !t || !c) return alert("請填寫內容");
        const img = await fileToBase64(f);
        if(img === "ERR") return;
        topicsRef.push({ name: n, title: t, content: c, image: img || "", time: Date.now() }).then(() => {
            showSection('home-page');
            clearInputs(['post-name','post-title','post-content','post-file']);
            startCooldown('post-submit-btn', '✅ 確認發佈');
        });
    }

    async function submitReply() {
        const n = document.getElementById('reply-name').value;
        const c = document.getElementById('reply-content').value;
        const f = document.getElementById('reply-file').files[0];
        if(!n || !c) return alert("請填寫內容");
        const img = await fileToBase64(f);
        if(img === "ERR") return;
        db.ref(`topics/${currentTopicId}/replies`).push({ name: n, content: c, image: img || "", time: Date.now() }).then(() => {
            clearInputs(['reply-name','reply-content','reply-file']);
            startCooldown('reply-submit-btn', '🏹 送出回覆');
        });
    }

    // --- 3. 其它管理功能 ---
    function toggleAll(source) {
        const checkboxes = document.getElementsByClassName('item-check');
        for (let i = 0; i < checkboxes.length; i++) checkboxes[i].checked = source.checked;
    }

    function batchDelete() {
        const checkboxes = document.getElementsByClassName('item-check');
        const ids = [];
        for (let i = 0; i < checkboxes.length; i++) { if (checkboxes[i].checked) ids.push(checkboxes[i].value); }
        if (ids.length === 0) return alert("未選取");
        if (confirm(`刪除這 ${ids.length} 項？`)) ids.forEach(id => db.ref(`topics/${id}`).remove());
    }

    function viewTopic(id) {
        currentTopicId = id;
        const t = topicsData[id];
        if (!t) { showSection('home-page'); return; }
        document.getElementById('display-title').innerText = t.title;
        document.getElementById('display-author').innerText = t.name;
        document.getElementById('display-content').innerHTML = formatContent(t.content, t.image);
        document.getElementById('delete-topic-btn').onclick = () => deleteTopic(id);
        const rList = document.getElementById('reply-list');
        rList.innerHTML = '';
        if (t.replies) {
            Object.keys(t.replies).forEach(rid => {
                const r = t.replies[rid];
                const d = document.createElement('div');
                d.className = 'reply-box';
                d.innerHTML = `<div style="color:var(--border-color); font-size:11px;">${r.name}： <button class="btn-delete" onclick="deleteReply('${id}','${rid}')">[🗑️]</button></div><div style="margin-top:5px;">${formatContent(r.content, r.image)}</div>`;
                rList.appendChild(d);
            });
        }
        showSection('view-page');
    }

    function formatContent(t, i) {
        let html = t.replace(/\n/g, '<br>');
        if(i) html += `<img src="${i}" class="content-img">`;
        return html;
    }

    async function fileToBase64(file) {
        if(!file) return null;
        if(file.size > MAX_SIZE) { alert("⛔ 500KB 以內"); return "ERR"; }
        return new Promise(res => {
            const rd = new FileReader();
            rd.readAsDataURL(file);
            rd.onload = () => res(rd.result);
        });
    }

    function clearInputs(ids) { ids.forEach(id => document.getElementById(id).value = ''); }
    function showSection(id) {
        document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'home-page') currentTopicId = null;
        window.scrollTo(0,0);
    }
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    function processLogin() {
        if(document.getElementById('login-pass').value === currentAdminPass) {
            document.getElementById('body-tag').classList.add('admin-mode');
            document.getElementById('admin-ctrls').style.display = 'flex';
            document.getElementById('admin-status').innerText = "🔱 管理權限已開啟";
            closeModal('login-modal');
        } else { alert("密令錯誤"); }
    }

    function adminLogout() {
        document.getElementById('body-tag').classList.remove('admin-mode');
        document.getElementById('admin-ctrls').style.display = 'none';
        document.getElementById('admin-status').innerText = "冒險者模式";
    }

    function processChangePw() {
        const p1 = document.getElementById('new-pw').value;
        if(p1 && p1 === document.getElementById('conf-pw').value) {
            adminRef.update({ password: p1 }).then(() => { alert("已修改！"); closeModal('pw-modal'); });
        } else { alert("不一致"); }
    }

    function deleteTopic(id, e) { if(e) e.stopPropagation(); if(confirm("焚毀？")) db.ref(`topics/${id}`).remove(); }
    function deleteReply(tid, rid) { if(confirm("刪除？")) db.ref(`topics/${tid}/replies/${rid}`).remove(); }
</script>

</body>
</html>
