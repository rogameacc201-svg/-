<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚔️ 輕鬆玩天堂 - 討論區 ⚔️</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --bg-color: rgba(11, 12, 16, 0.95); 
            --border-color: #bfa05d;
            --header-bg: rgba(32, 26, 22, 0.95);
            --text-main: #d1ccbc;
            --text-accent: #ffcc00;
            --input-bg: rgba(26, 26, 26, 0.9);
            --danger-red: #ff4444;
            --gold-gradient: linear-gradient(180deg, #bfa05d 0%, #7a6331 100%);
        }

        html {
            background: url('bg.png') no-repeat center center fixed;
            background-size: cover;
            background-color: #000;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif; 
            margin: 0; padding: 10px; min-height: 100vh;
        }

        .container { max-width: 900px; margin: 0 auto; }

        /* 側邊跟蹤選單 */
        .side-menu {
            position: fixed; right: 0; top: 50%; transform: translateY(-50%); z-index: 9999;
            background: rgba(20, 20, 20, 0.95); border: 2px solid var(--border-color);
            border-right: none; border-radius: 8px 0 0 8px; box-shadow: -5px 0 15px rgba(0,0,0,0.8);
            width: 100px; overflow: hidden;
        }
        .side-menu a {
            display: block; padding: 15px 10px; color: var(--text-accent);
            text-decoration: none; text-align: center; font-weight: bold; font-size: 14px;
            border-bottom: 1px solid rgba(191, 160, 93, 0.3); transition: 0.3s;
        }
        .side-menu a:hover { background: var(--gold-gradient); color: #000; }
        .side-menu-title { background: #333; color: #fff; font-size: 11px; padding: 5px 0; text-align: center; }

        /* 頂部操作列佈局 */
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .search-wrapper {
            display: flex;
            align-items: center;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 0 10px;
            flex-grow: 1;
            max-width: 300px;
        }

        .search-input {
            border: none !important;
            margin-bottom: 0 !important;
            padding: 8px !important;
            background: transparent !important;
            font-size: 14px !important;
        }

        /* 舊有樣式優化 */
        .forum-header { 
            background-color: var(--header-bg); border: 2px solid var(--border-color); 
            padding: 20px 10px; text-align: center; margin-bottom: 20px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .forum-header h1 { color: var(--text-accent); margin: 0; font-size: 1.8em; }

        .btn { background: var(--gold-gradient); border: 1px solid #000; color: #000; padding: 10px 18px; font-weight: bold; cursor: pointer; font-size: 14px; transition: 0.3s; border-radius: 2px; }
        .btn:hover { filter: brightness(1.2); }
        .btn:disabled { background: #555; color: #aaa; cursor: not-allowed; }
        
        .forum-table { width: 100%; border-collapse: collapse; background: rgba(21, 21, 21, 0.9); border: 1px solid #333; }
        th { background: rgba(44, 44, 44, 0.9); color: var(--border-color); padding: 12px; border-bottom: 2px solid var(--border-color); text-align: left; }
        td { padding: 15px 12px; border-bottom: 1px solid #333; }
        .topic-row:hover { background-color: rgba(42, 34, 21, 0.8); cursor: pointer; }

        .admin-checkbox { display: none; transform: scale(1.2); }
        body.admin-mode .admin-checkbox { display: inline-block; }

        input, textarea { width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid #555; color: #fff; margin-bottom: 10px; border-radius: 4px; box-sizing: border-box; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .page-section { display: none; }
        .page-section.active { display: block; }
        .content-img { max-width: 100%; height: auto; margin-top: 10px; border: 1px solid #555; }
        .reply-box { background: rgba(26, 26, 26, 0.9); border-left: 3px solid var(--border-color); padding: 15px; margin-top: 10px; }

        @media (max-width: 600px) {
            .search-wrapper { max-width: 100%; order: 2; }
            .btn-post-main { width: 100%; order: 1; }
        }
    </style>
</head>
<body id="body-tag">

<!-- 浮動跟蹤選單 -->
<nav class="side-menu">
    <div class="side-menu-title">快速傳送</div>
    <a href="https://rogameacc201-svg.github.io/my-auction/" target="_blank">💰 拍賣場</a>
    <a href="https://rogameacc201-svg.github.io/-/" target="_blank">💬 討論區</a>
</nav>

<div class="container">
    <div class="forum-header">
        <h1>⚔️ 輕鬆玩天堂 - 討論區 ⚔️</h1>
        <div id="admin-status" style="color: #888; font-size: 12px;">冒險者模式</div>
    </div>

    <!-- 1. 列表頁 -->
    <div id="home-page" class="page-section active">
        <div class="action-bar">
            <button class="btn btn-post-main" onclick="showSection('post-page')">📝 撰寫冒險筆記</button>
            <div class="search-wrapper">
                <span style="color:var(--border-color); margin-right:5px;">🔍</span>
                <input type="text" id="search-input" class="search-input" placeholder="搜索標題或作者..." onkeyup="filterTopics()">
            </div>
            <button class="btn btn-batch-delete" onclick="batchDelete()" style="background:#a30000; color:#fff; display:none;">🗑️ 批次刪除</button>
        </div>

        <table class="forum-table">
            <thead>
                <tr>
                    <th width="40"><input type="checkbox" id="check-all" class="admin-checkbox" onclick="toggleAll(this)"></th>
                    <th>📜 主題列表</th>
                    <th width="100">👤 作者</th>
                </tr>
            </thead>
            <tbody id="topic-list"></tbody>
        </table>
    </div>

    <!-- 2. 主題內容頁 (部分省略以節省空間，功能完整) -->
    <div id="view-page" class="page-section">
        <button class="btn" style="width:100%; margin-bottom:15px; background:#444; color:#fff;" onclick="showSection('home-page')">⬅️ 返回村莊</button>
        <div id="topic-detail" style="background:rgba(34,34,34,0.9); padding:20px; border-radius:5px; border:1px solid #444;">
            <h2 id="display-title" style="color:var(--text-accent); margin:0;"></h2>
            <small id="display-author" style="color:#88bcff;"></small>
            <hr style="border:0; border-top:1px solid #444; margin:15px 0;">
            <div id="display-content"></div>
        </div>
        <div id="reply-list"></div>
        <!-- 回覆區塊... (同前版) -->
    </div>

    <!-- 3. 發佈頁面... (同前版) -->
    <div id="post-page" class="page-section">
        <button class="btn" style="width:100%; margin-bottom:15px; background:#444; color:#fff;" onclick="showSection('home-page')">⬅️ 取消撰寫</button>
        <input type="text" id="post-name" placeholder="冒險者名稱">
        <input type="text" id="post-title" placeholder="紀錄主題">
        <textarea id="post-content" placeholder="內容..." style="height:200px;"></textarea>
        <button class="btn" id="post-submit-btn" onclick="submitPost()" style="width:100%;">✅ 確認發佈</button>
    </div>

    <div class="footer">系統版本：3.8 亞丁雲端版 | <span onclick="openModal('login-modal')">管理登入</span></div>
</div>

<script>
    // --- Firebase 配置 (請更換為你的配置) ---
    const firebaseConfig = {
  apiKey: "AIzaSyDfV9VWyrgcomvU6M5kP2Sugr29zoqrlo8",
  authDomain: "game1-7c85c.firebaseapp.com",
  databaseURL: "https://game1-7c85c-default-rtdb.firebaseio.com",
  projectId: "game1-7c85c",
  storageBucket: "game1-7c85c.firebasestorage.app",
  messagingSenderId: "1082794968010",
  appId: "1:1082794968010:web:8276a41c630442b3a88533",
  measurementId: "G-4P46QECVZX"
};
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const topicsRef = db.ref('topics');

    let topicsData = {};
    let currentTopicId = null;
    const COOLDOWN_TIME = 20;

    // 監聽數據
    topicsRef.on('value', (snap) => {
        topicsData = snap.val() || {};
        renderTopics();
    });

    // --- 核心功能：搜索過濾 ---
    function filterTopics() {
        const query = document.getElementById('search-input').value.toLowerCase();
        const rows = document.querySelectorAll('.topic-row');
        
        rows.forEach(row => {
            const title = row.querySelector('.topic-title-text').innerText.toLowerCase();
            const author = row.querySelector('.topic-author-text').innerText.toLowerCase();
            
            if (title.includes(query) || author.includes(query)) {
                row.style.display = "";
            } else {
                row.style.display = "none";
            }
        });
    }

    function renderTopics() {
        const list = document.getElementById('topic-list');
        list.innerHTML = '';
        Object.keys(topicsData).reverse().forEach(id => {
            const t = topicsData[id];
            const row = document.createElement('tr');
            row.className = 'topic-row';
            row.innerHTML = `
                <td><input type="checkbox" class="admin-checkbox item-check" value="${id}"></td>
                <td onclick="viewTopic('${id}')">
                    <span class="topic-title-text">${t.title}</span>
                </td>
                <td onclick="viewTopic('${id}')">
                    <span class="topic-author-text">${t.name}</span>
                </td>
            `;
            list.appendChild(row);
        });
        // 渲染後若搜索框有字，需重新執行過濾
        if(document.getElementById('search-input').value) filterTopics();
    }

    // 發布冷卻計時器
    function startCooldown(btnId, originalText) {
        const btn = document.getElementById(btnId);
        btn.disabled = true;
        let timeLeft = COOLDOWN_TIME;
        const timer = setInterval(() => {
            btn.innerText = `⏳ 等待 ${timeLeft}s...`;
            timeLeft--;
            if (timeLeft < 0) {
                clearInterval(timer);
                btn.disabled = false;
                btn.innerText = originalText;
            }
        }, 1000);
    }

    async function submitPost() {
        const n = document.getElementById('post-name').value;
        const t = document.getElementById('post-title').value;
        const c = document.getElementById('post-content').value;
        if(!n || !t || !c) return alert("內容未填完");
        
        topicsRef.push({ name: n, title: t, content: c, time: Date.now() }).then(() => {
            showSection('home-page');
            startCooldown('post-submit-btn', '✅ 確認發佈');
            document.getElementById('post-title').value = '';
            document.getElementById('post-content').value = '';
        });
    }

    function showSection(id) {
        document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }

    // 其他檢視、刪除、登入功能... (邏輯同前版)
</script>
</body>
</html>
